<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Paces | Run4Spring</title>
  <link rel="stylesheet" href="styles.css?v=0.1.1">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Run<span>4</span>Spring</a>
    <div class="nav-links"><a href="/">Home</a></div>
  </nav>
  <main class="container">
    <div class="page-header">
      <h1>Training Paces</h1>
      <p>Enter a recent race result to get your VDOT score and recommended training zones.</p>
    </div>

    <div class="card">
      <form id="form">
        <div class="form-row">
          <div class="form-group">
            <label for="distance">Race Distance</label>
            <select id="distance" required>
              <option value="800">800m</option>
              <option value="1500">1500m</option>
              <option value="Mile">Mile</option>
              <option value="3000">3000m</option>
              <option value="5000" selected>5K</option>
              <option value="10000">10K</option>
              <option value="HalfMarathon">Half Marathon</option>
              <option value="Marathon">Marathon</option>
            </select>
          </div>
          <div class="form-group">
            <label for="time">Race Time</label>
            <input type="text" id="time" placeholder="e.g. 20:00 or 1:05:30" required>
            <div class="form-hint">Format: MM:SS[.SSS] or H:MM:SS[.SSS] — minutes and seconds must be 2 digits (00–59)</div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Get Training Paces</button>
      </form>
      <div class="error-msg" id="error"></div>
    </div>

    <div class="card result" id="result">
      <div class="card-title">Your Training Zones</div>
      <div style="margin-bottom: 1.25rem;">
        <div class="vdot-score" id="vdot-score"></div>
        <div style="font-size: 0.8rem; color: var(--muted);">VDOT Score</div>
      </div>
      <table class="paces-table" id="paces-table">
        <thead>
          <tr>
            <th>Zone</th>
            <th>Pace</th>
          </tr>
        </thead>
        <tbody id="paces-body"></tbody>
      </table>
    </div>
  </main>

  <script>
    const LABELS = {
      easy_mi:        'Easy (per mile)',
      easy_km:        'Easy (per km)',
      mara_mi:        'Marathon pace (per mile)',
      mara_km:        'Marathon pace (per km)',
      threshold_400:  'Threshold (per 400m)',
      threshold_km:   'Threshold (per km)',
      threshold_mi:   'Threshold (per mile)',
      interval_400:   'Interval (per 400m)',
      interval_km:    'Interval (per km)',
      interval_mi:    'Interval (per mile)',
      rep_200:        'Repetition (per 200m)',
      rep_400:        'Repetition (per 400m)',
      rep_km:         'Repetition (per km)',
    };

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const error = document.getElementById('error');
      const result = document.getElementById('result');

      error.className = 'error-msg';
      result.className = 'card result';
      btn.disabled = true;
      btn.textContent = 'Loading...';

      try {
        const res = await fetch('/api/training/paces', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            distance: document.getElementById('distance').value,
            time: document.getElementById('time').value.trim()
          })
        });

        const text = await res.text();
        if (!res.ok) {
          error.textContent = text || 'An error occurred.';
          error.className = 'error-msg visible';
        } else {
          const data = JSON.parse(text);
          document.getElementById('vdot-score').textContent = data.vdot;
          const tbody = document.getElementById('paces-body');
          tbody.innerHTML = '';
          for (const [key, value] of Object.entries(data.paces)) {
            if (!value) continue;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${LABELS[key] || key}</td><td><strong>${value}</strong></td>`;
            tbody.appendChild(tr);
          }
          result.className = 'card result visible';
        }
      } catch {
        error.textContent = 'Could not reach the server. Is the app running?';
        error.className = 'error-msg visible';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Training Paces';
      }
    });
  </script>
  <footer class="footer">
    <p>&copy; 2026 Austin Rippee | All Rights Reserved</p>
  </footer>
</body>
</html>
