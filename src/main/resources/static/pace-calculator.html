<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pace Calculator | Run4Spring</title>
  <link rel="stylesheet" href="styles.css?v=0.1.2">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Run<span>4</span>Spring</a>
    <div class="nav-links"><a href="/">Home</a></div>
  </nav>
  <main class="container">
    <div class="page-header">
      <h1>Pace Calculator</h1>
      <p>Fill in any two fields and click Calculate to solve for the third.</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="unit">Distance Unit</label>
        <select id="unit" style="max-width:200px">
          <option value="miles">Miles</option>
          <option value="km">Kilometers</option>
        </select>
      </div>

      <div class="form-group">
        <label for="distance">Distance</label>
        <input type="text" id="distance" placeholder="e.g. 3.1">
        <div class="form-hint" id="distanceHint">In miles</div>
      </div>
      <div class="form-group">
        <label for="time">Total Time</label>
        <input type="text" id="time" placeholder="e.g. 25:00 or 1:05:30">
        <div class="form-hint">Format: MM:SS[.SSS] or H:MM:SS[.SSS] - seconds must be 2 digits (00–59)</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="paceMi">Pace (per mile)</label>
          <input type="text" id="paceMi" placeholder="e.g. 8:00">
          <div class="form-hint">Format: M:SS[.SSS]</div>
        </div>
        <div class="form-group">
          <label for="paceKm">Pace (per km)</label>
          <input type="text" id="paceKm" placeholder="e.g. 4:58">
          <div class="form-hint">Format: M:SS[.SSS]</div>
        </div>
      </div>

      <button class="btn btn-primary" id="calcBtn" onclick="calculate()">Calculate</button>
      <button class="btn btn-outline" style="margin-left: 0.5rem" onclick="clearAll()">Clear</button>
      <div class="error-msg" id="error"></div>
    </div>
  </main>

  <script>
    const MILES_TO_KM = 1.60934;

    const unitSelect = document.getElementById('unit');
    unitSelect.addEventListener('change', () => {
      const isKm = unitSelect.value === 'km';
      document.getElementById('distanceHint').textContent = isKm ? 'In kilometers' : 'In miles';
    });

    function parseTime(str) {
      if (!str || !str.trim()) return null;
      str = str.trim();
      const threePart = /^\d{1,2}:\d{2}:\d{2}(\.\d{1,3})?$/;
      const twoPart   = /^\d{1,2}:\d{2}(\.\d{1,3})?$/;
      if (!threePart.test(str) && !twoPart.test(str)) return null;
      const parts = str.split(':');
      if (parts.length === 3) {
        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        const s = parseFloat(parts[2]);
        if (m > 59 || s >= 60) return null;
        return h * 3600 + m * 60 + s;
      }
      const m = parseInt(parts[0], 10);
      const s = parseFloat(parts[1]);
      if (s >= 60) return null;
      return m * 60 + s;
    }

    function formatTime(totalSecs) {
      if (totalSecs < 0 || !isFinite(totalSecs)) return '—';
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = Math.round(totalSecs % 60);
      const mm = String(m).padStart(2, '0');
      const ss = String(s).padStart(2, '0');
      return h > 0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
    }

    function formatPace(secsPerUnit) {
      if (secsPerUnit <= 0 || !isFinite(secsPerUnit)) return '—';
      const m = Math.floor(secsPerUnit / 60);
      const s = Math.round(secsPerUnit % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function calculate() {
      const error = document.getElementById('error');
      error.className = 'error-msg';

      const distStr  = document.getElementById('distance').value.trim();
      const timeStr  = document.getElementById('time').value.trim();
      const paceKmStr = document.getElementById('paceKm').value.trim();
      const paceMiStr = document.getElementById('paceMi').value.trim();

      const dist    = distStr    ? parseFloat(distStr)    : null;
      const time    = timeStr    ? parseTime(timeStr)      : null;
      const paceKm  = paceKmStr  ? parseTime(paceKmStr)   : null;
      const paceMi  = paceMiStr  ? parseTime(paceMiStr)   : null;

      if (distStr && (dist === null || isNaN(dist) || dist <= 0)) {
        error.textContent = 'Invalid distance. Enter a positive number (e.g. 3.1).';
        error.className = 'error-msg visible';
        return;
      }
      if (timeStr && time === null) {
        error.textContent = 'Invalid time. Use MM:SS[.SSS] or H:MM:SS[.SSS] (e.g. 25:00 or 1:05:30).';
        error.className = 'error-msg visible';
        return;
      }
      if (paceKmStr && paceKm === null) {
        error.textContent = 'Invalid pace (km). Use M:SS[.SSS] (e.g. 4:58).';
        error.className = 'error-msg visible';
        return;
      }
      if (paceMiStr && paceMi === null) {
        error.textContent = 'Invalid pace (mile). Use M:SS[.SSS] (e.g. 8:00).';
        error.className = 'error-msg visible';
        return;
      }

      // Resolve the single pace value (seconds per mile) from whichever field is filled
      let paceInMi = null;
      if (paceMi !== null)     paceInMi = paceMi;
      else if (paceKm !== null) paceInMi = paceKm * MILES_TO_KM;

      const hasDist = dist !== null;
      const hasTime = time !== null;
      const hasPace = paceInMi !== null;
      const missingCount = [!hasDist, !hasTime, !hasPace].filter(Boolean).length;

      if (missingCount === 0) {
        error.textContent = 'All three fields are filled in. Clear one to calculate it.';
        error.className = 'error-msg visible';
        return;
      }
      if (missingCount > 1) {
        error.textContent = 'Fill in any two fields to calculate the third.';
        error.className = 'error-msg visible';
        return;
      }

      const isKm = unitSelect.value === 'km';

      if (!hasDist) {
        // Solve for distance
        const distMi = time / paceInMi;
        document.getElementById('distance').value = (isKm ? distMi * MILES_TO_KM : distMi).toFixed(2);
        // Fill whichever pace field was empty
        if (paceMi === null) document.getElementById('paceMi').value = formatPace(paceInMi);
        if (paceKm === null) document.getElementById('paceKm').value = formatPace(paceInMi / MILES_TO_KM);
      } else if (!hasTime) {
        // Solve for time
        const distMi = isKm ? dist / MILES_TO_KM : dist;
        document.getElementById('time').value = formatTime(distMi * paceInMi);
        // Fill whichever pace field was empty
        if (paceMi === null) document.getElementById('paceMi').value = formatPace(paceInMi);
        if (paceKm === null) document.getElementById('paceKm').value = formatPace(paceInMi / MILES_TO_KM);
      } else {
        // Solve for pace
        const distMi = isKm ? dist / MILES_TO_KM : dist;
        const solvedPaceMi = time / distMi;
        document.getElementById('paceMi').value = formatPace(solvedPaceMi);
        document.getElementById('paceKm').value = formatPace(solvedPaceMi / MILES_TO_KM);
      }
    }

    function clearAll() {
      document.getElementById('distance').value = '';
      document.getElementById('time').value = '';
      document.getElementById('paceKm').value = '';
      document.getElementById('paceMi').value = '';
      document.getElementById('error').className = 'error-msg';
    }
  </script>
  <footer class="footer">
    <p>&copy; 2026 Austin Rippee | All Rights Reserved</p>
  </footer>
</body>
</html>
